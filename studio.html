<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brille & Vibre Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #C9A84C;
      --gold-light: #E8CC80;
      --gold-pale:  #F5EDD4;
      --gold-dark:  #9A7530;
      --cream:      #FAF6EF;
      --beige:      #EDE4D3;
      --black:      #0D0D0D;
      --text:       #3A2E24;
      --text-light: #8C7560;
      --border:     rgba(201,168,76,0.2);
      --card:       #ffffff;
      --shadow:     rgba(58,46,36,0.08);
      --success:    #10b981;
      --error:      #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ANIMATIONS ── */
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn  { 0% { transform: scale(0.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulse  { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── PAGE WRAP ── */
    .page { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

    /* ── TYPOGRAPHY HELPERS ── */
    .section-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .section-title em { font-style: italic; color: var(--gold); }
    .section-body {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-light);
      margin-bottom: 24px;
    }
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 40px 0;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--beige);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 24px var(--shadow);
      margin-bottom: 20px;
    }
    .card-dark {
      background: var(--black);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 18px;
      padding: 24px;
      color: var(--cream);
      margin-bottom: 20px;
    }

    /* ── LABELS & INPUTS ── */
    .field { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 8px;
    }
    .field-hint {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 6px;
      line-height: 1.5;
    }
    .field-input,
    .field-textarea,
    .field-select {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid var(--beige);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    .field-textarea { min-height: 72px; resize: vertical; }
    .field-input:focus,
    .field-textarea:focus,
    .field-select:focus {
      outline: none;
      border-color: var(--gold);
      background: #fff;
    }
    .field-input::placeholder,
    .field-textarea::placeholder { color: var(--text-light); }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--black);
      box-shadow: 0 4px 16px rgba(201, 168, 76, 0.25);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(201, 168, 76, 0.4);
    }

    .btn-secondary {
      background: rgba(201, 168, 76, 0.1);
      color: var(--gold-dark);
      border: 1px solid rgba(201, 168, 76, 0.35);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--gold);
      color: var(--black);
      border-color: var(--gold);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-light);
      border: 1px solid var(--beige);
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold-dark);
    }

    .btn-block { width: 100%; }
    .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge-success { background: rgba(16, 185, 129, 0.12); color: #047857; }
    .badge-warn    { background: rgba(239, 68, 68, 0.1); color: #b91c1c; }
    .badge-gold    { background: rgba(201, 168, 76, 0.15); color: var(--gold-dark); }

    /* ── TOASTS ── */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      max-width: 340px;
    }
    .toast {
      background: var(--black);
      color: var(--cream);
      border-left: 4px solid var(--gold);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      animation: slideInRight 0.3s ease;
      pointer-events: auto;
    }
    .toast-success { border-left-color: var(--success); }
    .toast-error   { border-left-color: var(--error); }

    /* ── BACK BAR ── */
    .back-bar {
      background: var(--black);
      padding: 13px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(250, 246, 239, 0.6);
      text-decoration: none;
      padding: 7px 13px;
      border-radius: 8px;
      border: 1px solid rgba(201, 168, 76, 0.25);
      background: rgba(201, 168, 76, 0.08);
      transition: all 0.2s ease;
    }
    .back-link:hover {
      background: rgba(201, 168, 76, 0.18);
      border-color: rgba(201, 168, 76, 0.5);
      color: var(--gold-light);
      transform: translateX(-2px);
    }
    .back-link svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      flex-shrink: 0;
    }
    .profile-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .profile-status.complete {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border-color: rgba(16, 185, 129, 0.3);
    }
    .profile-status.incomplete {
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.3);
    }
    .profile-status:hover { transform: translateY(-1px); }

    /* ── COVER ── */
    .cover {
      background: var(--black);
      padding: 48px 24px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cover::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.2) 0%, transparent 70%);
      pointer-events: none;
    }
    .cover::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-ring {
      position: relative;
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
    }
    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--gold-light), var(--gold-pale), var(--gold), var(--gold-light), var(--gold));
      animation: spin 8s linear infinite;
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--black);
    }
    .logo-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .cover-brand {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      font-style: italic;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    .cover-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--black);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .cover-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 8vw, 56px);
      font-weight: 900;
      line-height: 0.95;
      color: var(--cream);
      position: relative;
      z-index: 1;
      margin-bottom: 8px;
    }
    .cover-title em { color: var(--gold); font-style: italic; }
    .cover-title .outline {
      -webkit-text-stroke: 2px var(--gold);
      color: transparent;
    }
    .cover-sub {
      font-size: 14px;
      color: rgba(250, 246, 239, 0.55);
      max-width: 440px;
      margin: 18px auto 0;
      line-height: 1.65;
      position: relative;
      z-index: 1;
      border-left: 2px solid var(--gold);
      padding-left: 14px;
      text-align: left;
    }

    /* ── TAB NAV ── */
    .tab-nav {
      background: var(--card);
      border-bottom: 1.5px solid var(--beige);
      position: sticky;
      top: 47px;
      z-index: 40;
      box-shadow: 0 4px 18px var(--shadow);
    }
    .tab-nav-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      padding: 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-nav-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 18px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      margin-bottom: -1.5px;
    }
    .tab-btn:hover { color: var(--gold-dark); }
    .tab-btn.active {
      color: var(--gold-dark);
      border-bottom-color: var(--gold);
      font-weight: 700;
    }
    .tab-btn .tab-icon { font-size: 16px; }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; animation: fadeUp 0.3s ease; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <!-- ── BACK BAR ── -->
  <header id="back-bar" class="back-bar">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Retour aux Hooks
    </a>
    <span id="profile-status" class="profile-status incomplete">⚠ Profil incomplet</span>
  </header>

  <!-- ── COVER ── -->
  <section id="cover" class="cover">
    <div class="logo-ring">
      <img src="desert1.jpg" alt="Brille & Vibre" class="logo-img">
    </div>
    <p class="cover-brand">Brille &amp; Vibre</p>
    <div class="cover-tag">Studio Éditorial</div>
    <h1 class="cover-title">
      Brille &amp; Vibre<br>
      <em>Studio</em>
    </h1>
    <p class="cover-sub">Ton studio pour créer des hooks, posts, légendes et stories qui captivent — propulsé par Claude AI et la psychologie de la vente.</p>
  </section>

  <!-- ── TAB NAV ── -->
  <nav id="tab-nav" class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="profil">
        <span class="tab-icon">⚙️</span>
        <span>Profil</span>
      </button>
      <button class="tab-btn" data-tab="posts">
        <span class="tab-icon">📝</span>
        <span>Posts</span>
      </button>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <main id="main">

    <!-- Onglet : Profil / Brand Voice -->
    <section id="tab-profil" class="tab-panel active"></section>

    <!-- Onglet : Posts -->
    <section id="tab-posts" class="tab-panel"></section>

  </main>

  <!-- ── TOAST CONTAINER ── -->
  <div id="toast-container"></div>

  <script>
    /* ── TAB SWITCHING ── */
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === `tab-${tabName}`);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
  </script>

</body>
</html>
